name: hardfuzz_app
description: HardFuzz v2 — BLE client to run fault-injection campaigns and view results.
publish_to: none
version: 0.1.0

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_reactive_ble: ^5.3.1   # cross-platform BLE central
  printing: ^5.12.0              # HTML/PDF export of the evidence report
  path_provider: ^2.1.0          # save reports

dev_dependencies:
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
